[window]
opacity = 1.0
padding = { x = 0, y = 0 }

[font]
normal = { family = "DejaVuSansM Nerd Font Mono", style = "Book" }
bold = { family = "DejaVuSansM Nerd Font Mono", style = "Bold" }
italic = { family = "DejaVuSansM Nerd Font Mono", style = "Italic" }
bold_italic = { family = "DejaVuSansM Nerd Font Mono", style = "Bold Italic" }
size = 10

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500

[mouse]
bindings = [
  { mouse = "Right", action = "PasteSelection" }
]
hide_when_typing = true

[colors.selection]
text = "#000000"
background = "#BFBFBF"

[colors.cursor]
text = '#122637'
cursor = "#FFFFFF"

[colors.primary]
background = "#000000"
foreground = "#D3D7CF"

[colors.normal]
black   = '#000000'
red     = '#ff0000'
green   = '#37dd21'
yellow  = '#fee409'
blue    = '#1460d2'
magenta = '#ff005d'
cyan    = '#00bbbb'
white   = '#bbbbbb'

[colors.bright]
black   = '#545454'
red     = '#f40d17'
green   = '#3bcf1d'
yellow  = '#ecc809'
blue    = '#5555ff'
magenta = '#ff55ff'
cyan    = '#6ae3f9'
white   = '#ffffff'

[scrolling]
multiplier = 3
